<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">MetroTrust Capital app icon</title>
  <desc id="desc">Dark rounded square icon with a glowing MetroTrust roof and MM monogram.</desc>
  <defs>
    <linearGradient id="outerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#213447" />
      <stop offset="100%" stop-color="#0a1522" />
    </linearGradient>
    <linearGradient id="innerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2c3d" />
      <stop offset="100%" stop-color="#09121d" />
    </linearGradient>
    <linearGradient id="glowStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2f8ff" />
      <stop offset="100%" stop-color="#c7dcff" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="7" y="7" width="114" height="114" rx="27" fill="url(#outerBg)" />
  <rect x="10" y="10" width="108" height="108" rx="24" fill="url(#innerBg)" />
  <path d="M36 18c8-5 48-5 56 0 8 5 18 16 18 32v29c0 16-13 29-29 29H47C31 108 18 95 18 79V50c0-16 10-27 18-32Z" fill="rgba(255,255,255,0.02)" />
  <circle cx="64" cy="64" r="31" fill="rgba(255,255,255,0.02)" stroke="rgba(177,198,228,0.45)" stroke-width="1.4" />
  <circle cx="64" cy="64" r="25" fill="rgba(7,14,23,0.45)" stroke="rgba(177,198,228,0.2)" stroke-width="1" />
  <g filter="url(#softGlow)" fill="none" stroke="url(#glowStroke)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M44 55 64 39 84 55" stroke-width="3.6" />
    <path d="M50 77V61l13 13 13-13v16" stroke-width="3.8" />
